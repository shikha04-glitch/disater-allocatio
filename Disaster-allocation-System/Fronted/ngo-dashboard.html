<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO Dashboard</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<!-- Navbar -->
<div class="navbar">
<h2>NGO Dashboard</h2>

<div class="nav-links">
<a href="map.html">View Map</a>
<a href="login.html">Logout</a>
</div>

</div>

<!-- Main Container -->
<div class="container">

<!-- Add Resource Card -->
<div class="card">

<h3>Add Available Resources</h3>

<input type="text" id="ngoResourceType" placeholder="Resource Type">

<input type="number" id="ngoResourceQty" placeholder="Quantity">

<input type="text" id="ngoResourceLocation" placeholder="Location">

<button onclick="addNgoResource()">Add Resource</button>

</div>

<!-- Resource Table Card -->
<div class="card">

<h3>My Resources</h3>

<table id="ngoResourceTable">

<thead>
<tr>
<th>Resource</th>
<th>Qty</th>
<th>Location</th>
</tr>
</thead>

<tbody id="resourceBody">
</tbody>

</table>

</div>

</div>

<script src="js/ngo.js"></script>

</body>
</html>
