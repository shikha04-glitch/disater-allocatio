<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMS Portal Login / Sign Up</title>
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-container">

  <div class="login-header">
    <h2>Disaster Management System</h2>
    <p>Select your role and access the portal</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('login')">Login</button>
    <button class="tab-btn" onclick="showTab('signup')">Sign Up</button>
  </div>

  <!-- Login Form -->
  <form id="loginForm" class="form active">
    <label>Select Role</label>
    <select id="role" required>
      <option value="">Select Role</option>
      <option value="admin">Admin</option>
      <option value="volunteer">Volunteer</option>
      <option value="ngo">NGO</option>
    </select>

    <label>Username</label>
    <input type="text" id="username" required>

    <label>Password</label>
    <input type="password" id="password" required>

    <button type="submit" class="login-btn">Login</button>
  </form>

  <!-- Sign Up Form -->
  <form id="signupForm" class="form">
    <label>Select Role</label>
    <select id="signupRole" required>
      <option value="">Select Role</option>
      <option value="admin">Admin</option>
      <option value="volunteer">Volunteer</option>
      <option value="ngo">NGO</option>
    </select>

    <label>Username</label>
    <input type="text" id="signupUsername" required>

    <label>Password</label>
    <input type="password" id="signupPassword" required>

    <label>Confirm Password</label>
    <input type="password" id="signupConfirm" required>

    <button type="submit" class="signup-btn">Sign Up</button>
  </form>

</div>

<script src="js/login.js"></script>
</body>
</html>
